<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 70" width="280" height="70">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Pure text wordmark -->
  <text x="4" y="52"
        font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif"
        font-size="52"
        font-weight="800"
        fill="url(#g)"
        filter="url(#glow)"
        letter-spacing="-3">Nexis</text>

  <!-- Claw with different weight -->
  <text x="5" y="68"
        font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif"
        font-size="13"
        font-weight="500"
        fill="#a855f7"
        opacity="0.95"
        letter-spacing="7">CLAW</text>
</svg>
