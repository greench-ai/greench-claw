name: GreenchClaw
options:
  bundleIdPrefix: ai.GreenchClaw
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  GreenchClawKit:
    path: ../shared/GreenchClawKit
  Swabble:
    path: ../swabble

schemes:
  GreenchClaw:
    shared: true
    build:
      targets:
        GreenchClaw: all
    test:
      targets:
        - GreenchClawTests
        - GreenchClawLogicTests
  GreenchClawLogicTests:
    shared: true
    build:
      targets:
        GreenchClawLogicTests: all
    test:
      targets:
        - GreenchClawLogicTests

targets:
  GreenchClaw:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: GreenchClawShareExtension
        embed: true
      - target: GreenchClawActivityWidget
        embed: true
      - target: GreenchClawWatchApp
      - package: GreenchClawKit
      - package: GreenchClawKit
        product: GreenchClawChatUI
      - package: GreenchClawKit
        product: GreenchClawProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../config/swiftformat" \
            --unexclude "$SRCROOT/Sources,$SRCROOT/ShareExtension,$SRCROOT/ActivityWidget,$SRCROOT/WatchExtension,$SRCROOT/../shared/GreenchClawKit,$SRCROOT/../swabble" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/GreenchClaw.entitlements
        CODE_SIGN_STYLE: "$(GREENCHCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(GREENCHCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(GREENCHCLAW_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(GREENCHCLAW_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          GREENCHCLAW_PUSH_TRANSPORT: direct
          GREENCHCLAW_PUSH_DISTRIBUTION: local
          GREENCHCLAW_PUSH_RELAY_BASE_URL: ""
          GREENCHCLAW_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          GREENCHCLAW_PUSH_TRANSPORT: direct
          GREENCHCLAW_PUSH_DISTRIBUTION: local
          GREENCHCLAW_PUSH_RELAY_BASE_URL: ""
          GREENCHCLAW_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: GreenchClaw
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.GreenchClaw.ios
            CFBundleURLSchemes:
              - GreenchClaw
        CFBundleShortVersionString: "$(GREENCHCLAW_MARKETING_VERSION)"
        GreenchClawCanonicalVersion: "$(GREENCHCLAW_IOS_VERSION)"
        CFBundleVersion: "$(GREENCHCLAW_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.GreenchClaw.ios.bgrefresh
        NSLocalNetworkUsageDescription: GreenchClaw discovers and connects to your GreenchClaw gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _GreenchClaw-gw._tcp
        NSCameraUsageDescription: GreenchClaw can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: GreenchClaw uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: GreenchClaw can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: GreenchClaw needs microphone access for voice wake.
        NSMotionUsageDescription: GreenchClaw may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: GreenchClaw needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: GreenchClaw uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        GreenchClawPushTransport: "$(GREENCHCLAW_PUSH_TRANSPORT)"
        GreenchClawPushDistribution: "$(GREENCHCLAW_PUSH_DISTRIBUTION)"
        GreenchClawPushRelayBaseURL: "$(GREENCHCLAW_PUSH_RELAY_BASE_URL)"
        GreenchClawPushAPNsEnvironment: "$(GREENCHCLAW_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  GreenchClawShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: GreenchClawKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(GREENCHCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(GREENCHCLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(GREENCHCLAW_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(GREENCHCLAW_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: GreenchClaw Share
        CFBundleShortVersionString: "$(GREENCHCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(GREENCHCLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  GreenchClawActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/GreenchClawActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(GREENCHCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(GREENCHCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(GREENCHCLAW_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: GreenchClaw Activity
        CFBundleShortVersionString: "$(GREENCHCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(GREENCHCLAW_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  GreenchClawWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: GreenchClawWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(GREENCHCLAW_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(GREENCHCLAW_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(GREENCHCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(GREENCHCLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(GREENCHCLAW_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(GREENCHCLAW_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: GreenchClaw
        CFBundleShortVersionString: "$(GREENCHCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(GREENCHCLAW_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(GREENCHCLAW_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  GreenchClawWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(GREENCHCLAW_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(GREENCHCLAW_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(GREENCHCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(GREENCHCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(GREENCHCLAW_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(GREENCHCLAW_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: GreenchClaw
        CFBundleShortVersionString: "$(GREENCHCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(GREENCHCLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(GREENCHCLAW_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  GreenchClawTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: GreenchClaw
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(GREENCHCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(GREENCHCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.GreenchClaw.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GreenchClaw.app/GreenchClaw"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: GreenchClawTests
        CFBundleShortVersionString: "$(GREENCHCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(GREENCHCLAW_BUILD_VERSION)"

  GreenchClawLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: GreenchClawKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(GREENCHCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(GREENCHCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.GreenchClaw.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_EMIT_CONST_VALUE_PROTOCOLS: ""
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: GreenchClawLogicTests
        CFBundleShortVersionString: "$(GREENCHCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(GREENCHCLAW_BUILD_VERSION)"
