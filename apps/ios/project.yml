name: NexisClaw
options:
  bundleIdPrefix: ai.NexisClaw
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  NexisClawKit:
    path: ../shared/NexisClawKit
  Swabble:
    path: ../swabble

schemes:
  NexisClaw:
    shared: true
    build:
      targets:
        NexisClaw: all
    test:
      targets:
        - NexisClawTests
        - NexisClawLogicTests
  NexisClawLogicTests:
    shared: true
    build:
      targets:
        NexisClawLogicTests: all
    test:
      targets:
        - NexisClawLogicTests

targets:
  NexisClaw:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: NexisClawShareExtension
        embed: true
      - target: NexisClawActivityWidget
        embed: true
      - target: NexisClawWatchApp
      - package: NexisClawKit
      - package: NexisClawKit
        product: NexisClawChatUI
      - package: NexisClawKit
        product: NexisClawProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../config/swiftformat" \
            --unexclude "$SRCROOT/Sources,$SRCROOT/ShareExtension,$SRCROOT/ActivityWidget,$SRCROOT/WatchExtension,$SRCROOT/../shared/NexisClawKit,$SRCROOT/../swabble" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/NexisClaw.entitlements
        CODE_SIGN_STYLE: "$(NEXISCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(NEXISCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(NEXISCLAW_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(NEXISCLAW_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          NEXISCLAW_PUSH_TRANSPORT: direct
          NEXISCLAW_PUSH_DISTRIBUTION: local
          NEXISCLAW_PUSH_RELAY_BASE_URL: ""
          NEXISCLAW_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          NEXISCLAW_PUSH_TRANSPORT: direct
          NEXISCLAW_PUSH_DISTRIBUTION: local
          NEXISCLAW_PUSH_RELAY_BASE_URL: ""
          NEXISCLAW_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: NexisClaw
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.NexisClaw.ios
            CFBundleURLSchemes:
              - NexisClaw
        CFBundleShortVersionString: "$(NEXISCLAW_MARKETING_VERSION)"
        NexisClawCanonicalVersion: "$(NEXISCLAW_IOS_VERSION)"
        CFBundleVersion: "$(NEXISCLAW_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.NexisClaw.ios.bgrefresh
        NSLocalNetworkUsageDescription: NexisClaw discovers and connects to your NexisClaw gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _NexisClaw-gw._tcp
        NSCameraUsageDescription: NexisClaw can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: NexisClaw uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: NexisClaw can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: NexisClaw needs microphone access for voice wake.
        NSMotionUsageDescription: NexisClaw may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: NexisClaw needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: NexisClaw uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        NexisClawPushTransport: "$(NEXISCLAW_PUSH_TRANSPORT)"
        NexisClawPushDistribution: "$(NEXISCLAW_PUSH_DISTRIBUTION)"
        NexisClawPushRelayBaseURL: "$(NEXISCLAW_PUSH_RELAY_BASE_URL)"
        NexisClawPushAPNsEnvironment: "$(NEXISCLAW_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  NexisClawShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: NexisClawKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(NEXISCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(NEXISCLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(NEXISCLAW_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(NEXISCLAW_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: NexisClaw Share
        CFBundleShortVersionString: "$(NEXISCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(NEXISCLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  NexisClawActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/NexisClawActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(NEXISCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(NEXISCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(NEXISCLAW_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: NexisClaw Activity
        CFBundleShortVersionString: "$(NEXISCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(NEXISCLAW_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  NexisClawWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: NexisClawWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(NEXISCLAW_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(NEXISCLAW_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(NEXISCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(NEXISCLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(NEXISCLAW_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(NEXISCLAW_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: NexisClaw
        CFBundleShortVersionString: "$(NEXISCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(NEXISCLAW_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(NEXISCLAW_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  NexisClawWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(NEXISCLAW_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(NEXISCLAW_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(NEXISCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(NEXISCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(NEXISCLAW_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(NEXISCLAW_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: NexisClaw
        CFBundleShortVersionString: "$(NEXISCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(NEXISCLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(NEXISCLAW_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  NexisClawTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: NexisClaw
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(NEXISCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(NEXISCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.NexisClaw.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/NexisClaw.app/NexisClaw"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: NexisClawTests
        CFBundleShortVersionString: "$(NEXISCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(NEXISCLAW_BUILD_VERSION)"

  NexisClawLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: NexisClawKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(NEXISCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(NEXISCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.NexisClaw.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_EMIT_CONST_VALUE_PROTOCOLS: ""
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: NexisClawLogicTests
        CFBundleShortVersionString: "$(NEXISCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(NEXISCLAW_BUILD_VERSION)"
