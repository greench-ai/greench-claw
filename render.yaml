services:
  - type: web
    name: NexisClaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NEXISCLAW_GATEWAY_PORT
        value: "8080"
      - key: NEXISCLAW_STATE_DIR
        value: /data/.NexisClaw
      - key: NEXISCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: NEXISCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: NexisClaw-data
      mountPath: /data
      sizeGB: 1
