<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <linearGradient id="go" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="120" height="120" fill="#0a0a0f"/>

  <!-- N shape: sharp angular, futuristic -->
  <path d="M25 90 L25 30 L42 30 L58 70 L58 30 L75 30 L75 90 L58 90 L42 50 L58 90 L75 90 Z"
        fill="none"
        stroke="url(#g)"
        stroke-width="6"
        stroke-linejoin="round"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Claw pincer: extends from right stroke, subtle -->
  <path d="M78 72 Q90 65 98 52 Q104 42 100 36 Q96 30 88 36 Q82 40 86 50 Q88 58 82 66 Q80 70 78 72 Z"
        fill="url(#go)"
        opacity="0.9"/>

  <!-- Small accent dot -->
  <circle cx="104" cy="34" r="3" fill="#00ff88" opacity="0.7"/>
</svg>
